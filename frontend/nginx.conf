# Nginx config for the production frontend image.
# Serves the built Angular SPA and reverse-proxies API + SSE to the backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets / SPA routing — fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST + SSE to the backend service (name from docker-compose).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # --- Critical for Server-Sent Events: disable buffering & keep alive ---
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
